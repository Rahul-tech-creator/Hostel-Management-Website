<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F8F9FA" />
    <title>Premium Hostel OS</title>
    
    <!-- Google Fonts: Plus Jakarta Sans for premium SaaS typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased overflow-x-hidden">
    <!-- Aurora Mesh Background (App-level but globally placed to avoid re-renders) -->
    <div id="aurora-bg" class="fixed inset-0 -z-10 overflow-hidden bg-slate-50">
      <div class="absolute -top-[10%] -left-[10%] w-[600px] h-[600px] rounded-full bg-brand-600/15 blur-[80px] animate-float opacity-50"></div>
      <div class="absolute -bottom-[20%] -right-[10%] w-[700px] h-[700px] rounded-full bg-purple-600/15 blur-[80px] animate-float-delayed opacity-50"></div>
      <div class="absolute top-[40%] left-[40%] w-[500px] h-[500px] rounded-full bg-emerald-600/10 blur-[80px] animate-float-slow opacity-50"></div>
      <div class="absolute inset-0 mix-blend-overlay pointer-events-none opacity-5" style="background-image: url(&quot;data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E&quot;);"></div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
